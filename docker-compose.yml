services:
  daemon:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
      - "127.0.0.1:5052:5052"
    volumes:
      - ./workspace:/openghost/workspace
      - ./state:/openghost/state
      - ./.env:/openghost/.env:ro
      - ./config.json:/openghost/config.json:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
